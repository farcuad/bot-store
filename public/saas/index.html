<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bot Store — SaaS Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: rgba(255,255,255,0.06);
      --accent: #7c5ef5;
      --accent-glow: rgba(124,94,245,0.25);
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --blue: #3b82f6;
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Auth overlay ─────────────────────────────────────── */
    #auth-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 360px;
      box-shadow: 0 0 60px rgba(124,94,245,0.12);
    }
    .auth-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .auth-card p  { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
    .auth-card input {
      width: 100%; padding: 12px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px;
      outline: none; margin-bottom: 12px;
    }
    .auth-card input:focus { border-color: var(--accent); }

    /* ── Layout ────────────────────────────────────────────── */
    #app { display: none; flex-direction: column; min-height: 100vh; }
    #app.visible { display: flex; }

    header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo { font-size: 18px; font-weight: 700; }
    .logo span { color: var(--accent); }
    header .actions { margin-left: auto; display: flex; gap: 8px; }

    main { flex: 1; padding: 24px; max-width: 1200px; margin: 0 auto; width: 100%; }

    /* ── Cards ─────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-header h2 { font-size: 15px; font-weight: 600; }

    /* ── Buttons ───────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 8px; border: none;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all .15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6a4ee0; box-shadow: 0 0 16px var(--accent-glow); }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* ── Status badge ──────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
    .badge.ready   { background: rgba(34,197,94,0.12); color: var(--green); }
    .badge.ready   .badge-dot { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
    .badge.qr      { background: rgba(245,158,11,0.12); color: var(--yellow); }
    .badge.qr      .badge-dot { background: var(--yellow); }
    .badge.idle, .badge.disconnected, .badge.error {
      background: rgba(239,68,68,0.1); color: var(--red);
    }
    .badge.idle .badge-dot, .badge.disconnected .badge-dot, .badge.error .badge-dot {
      background: var(--red);
    }
    .badge.initializing { background: rgba(59,130,246,0.12); color: var(--blue); }
    .badge.initializing .badge-dot { background: var(--blue); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* ── Bot grid ───────────────────────────────────────────── */
    #bots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .bot-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: border-color .2s, transform .15s;
      position: relative;
      overflow: hidden;
    }
    .bot-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      opacity: 0; transition: opacity .2s;
    }
    .bot-card:hover { border-color: rgba(124,94,245,0.4); transform: translateY(-1px); }
    .bot-card:hover::before { opacity: 1; }
    .bot-card:active { transform: translateY(0); }

    .bot-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .bot-name { font-weight: 600; font-size: 15px; }
    .bot-id { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .bot-actions { display: flex; gap: 6px; margin-top: 16px; }

    /* ── Modal ─────────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; z-index: 50;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      width: 440px;
      max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: slideUp .2s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
    .modal label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
    .modal input {
      width: 100%; padding: 10px 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px;
      outline: none; margin-bottom: 16px;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* ── QR modal ──────────────────────────────────────────── */
    #qr-modal .modal { text-align: center; }
    #qr-container {
      display: flex; align-items: center; justify-content: center;
      min-height: 200px;
      margin: 16px 0;
    }
    #qr-container img { border-radius: 10px; max-width: 220px; width: 100%; }
    .qr-hint { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
    .qr-status { font-size: 13px; color: var(--green); font-weight: 500; }

    /* ── Loader ────────────────────────────────────────────── */
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ─────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 18px; font-size: 13px;
      opacity: 0; transform: translateY(8px);
      transition: all .25s; pointer-events: none; z-index: 200;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-left: 3px solid var(--green); }
    #toast.error   { border-left: 3px solid var(--red); }

    /* ── Empty state ───────────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>

<!-- ── Auth Screen ─────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-card">
    <h1>🤖 Bot Store SaaS</h1>
    <p>Ingresa tu contraseña de administrador</p>
    <input id="pwd-input" type="password" placeholder="Contraseña" />
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Entrar</button>
    <p id="auth-error" style="color:var(--red);font-size:12px;margin-top:10px;display:none">Contraseña incorrecta</p>
  </div>
</div>

<!-- ── Main App ─────────────────────────────────────────── -->
<div id="app">
  <header>
    <div class="logo">Bot <span>Store</span></div>
    <span style="color:var(--muted);font-size:13px">SaaS Dashboard</span>
    <div class="actions">
      <button class="btn btn-primary" onclick="openCreateModal()">＋ Nuevo Bot</button>
      <button class="btn btn-ghost" onclick="loadBots()">↺ Actualizar</button>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Salir</button>
    </div>
  </header>

  <main>
    <div class="section-header">
      <h2 id="bot-count">Cargando bots…</h2>
    </div>
    <div id="bots-grid">
      <div class="empty-state">
        <div class="spinner" style="margin:0 auto 16px"></div>
      </div>
    </div>
  </main>
</div>

<!-- ── Create Bot Modal ─────────────────────────────────── -->
<div class="modal-backdrop" id="create-modal">
  <div class="modal">
    <h2>➕ Crear nuevo bot</h2>
    <label>Nombre del bot</label>
    <input id="new-bot-name" type="text" placeholder="Ej: Bot de Ventas" />
    <label>Contraseña para panel de control (opcional)</label>
    <input id="new-bot-password" type="password" placeholder="Dejar en blanco para la del sistema" />
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('create-modal')">Cancelar</button>
      <button class="btn btn-primary" onclick="createBot()">Crear bot</button>
    </div>
  </div>
</div>

<!-- ── QR Modal ─────────────────────────────────────────── -->
<div class="modal-backdrop" id="qr-modal">
  <div class="modal">
    <h2>📱 Escanear QR</h2>
    <p class="qr-hint">Abre WhatsApp → Dispositivos vinculados → Vincular dispositivo</p>
    <div id="qr-container">
      <div class="spinner"></div>
    </div>
    <p id="qr-status" class="qr-status" style="display:none"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeQrModal()">Cerrar</button>
    </div>
  </div>
</div>

<!-- ── Toast ─────────────────────────────────────────────── -->
<div id="toast"></div>

<script>
  // ── Auth ────────────────────────────────────────────────────
  let token = localStorage.getItem('saas_token');
  if (token) showApp();

  async function doLogin() {
    const pwd = document.getElementById('pwd-input').value;
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    });
    if (r.ok) {
      const d = await r.json();
      token = d.token;
      localStorage.setItem('saas_token', token);
      showApp();
    } else {
      document.getElementById('auth-error').style.display = '';
    }
  }

  function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    loadBots();
    // Auto-refresh every 10s
    setInterval(loadBots, 10_000);
  }

  function logout() {
    localStorage.removeItem('saas_token');
    location.reload();
  }

  document.getElementById('pwd-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // ── API helpers ──────────────────────────────────────────────
  async function api(path, opts = {}) {
    const r = await fetch('/api/saas' + path, {
      ...opts,
      headers: {
        'Content-Type': 'application/json',
        'x-admin-token': token || '',
        ...(opts.headers || {}),
      },
    });
    if (r.status === 401) { logout(); return null; }
    return r.json();
  }

  // ── Bot listing ──────────────────────────────────────────────
  async function loadBots() {
    const res = await api('/bots');
    if (!res?.ok) return;
    const bots = res.data;
    const countEl = document.getElementById('bot-count');
    const grid = document.getElementById('bots-grid');

    countEl.textContent = `${bots.length} bot${bots.length !== 1 ? 's' : ''} registrado${bots.length !== 1 ? 's' : ''}`;

    if (bots.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="icon">🤖</div>
          <p>No hay bots aún. Crea el primero.</p>
        </div>`;
      return;
    }

    grid.innerHTML = bots.map(bot => `
      <div class="bot-card" onclick="selectBot('${bot.botId}')">
        <div class="bot-card-header">
          <div>
            <div class="bot-name">${escHtml(bot.nombre)}</div>
            <div class="bot-id">${bot.botId}</div>
          </div>
          ${statusBadge(bot.status)}
        </div>
        <div style="font-size:12px;color:var(--muted)">
          ${bot.readySince
            ? '🟢 Activo desde ' + new Date(bot.readySince).toLocaleTimeString()
            : bot.lastError
              ? '⚠️ ' + escHtml(bot.lastError)
              : '—'}
        </div>
        <div class="bot-actions" onclick="event.stopPropagation()">
          ${bot.status === 'qr' || bot.status === 'initializing'
            ? `<button class="btn btn-ghost btn-sm" onclick="openQr('${bot.botId}')">📱 Ver QR</button>`
            : ''}
          ${bot.status === 'ready'
            ? `<button class="btn btn-ghost btn-sm" onclick="botAction('${bot.botId}','stop')">⏹ Parar</button>`
            : bot.status === 'idle' || bot.status === 'disconnected' || bot.status === 'error'
              ? `<button class="btn btn-ghost btn-sm" onclick="botAction('${bot.botId}','start')">▶ Iniciar</button>`
              : ''}
          <button class="btn btn-ghost btn-sm" onclick="botAction('${bot.botId}','restart')">↺ Reiniciar</button>
          <button class="btn btn-danger btn-sm" onclick="deleteBot('${bot.botId}')">🗑</button>
        </div>
      </div>`).join('');
  }

  function statusBadge(status) {
    const labels = {
      ready: '● Conectado', qr: '● Esperando QR',
      initializing: '● Iniciando', idle: '● Inactivo',
      disconnected: '● Desconectado', error: '● Error',
    };
    return `<span class="badge ${status}">
      <span class="badge-dot"></span>${labels[status] || status}
    </span>`;
  }

  // ── Bot actions ──────────────────────────────────────────────
  async function botAction(id, action) {
    const r = await api(`/bots/${id}/${action}`, { method: 'POST' });
    if (r?.ok) { toast('✅ ' + action + ' ejecutado', 'success'); loadBots(); }
    else toast('❌ Error: ' + (r?.error || 'unknown'), 'error');
  }

  async function deleteBot(id) {
    if (!confirm(`¿Eliminar ${id}?`)) return;
    const r = await api(`/bots/${id}`, { method: 'DELETE' });
    if (r?.ok) { toast('🗑 Bot eliminado', 'success'); loadBots(); }
    else toast('❌ ' + (r?.error || 'Error'), 'error');
  }

  function selectBot(id) {
    // Placeholder: could open a detail panel or navigate
    console.log('Selected bot:', id);
  }

  // ── Create bot ───────────────────────────────────────────────
  function openCreateModal() {
    document.getElementById('new-bot-name').value = '';
    document.getElementById('new-bot-password').value = '';
    document.getElementById('create-modal').classList.add('open');
  }

  async function createBot() {
    const nombre = document.getElementById('new-bot-name').value.trim();
    const password = document.getElementById('new-bot-password').value;
    if (!nombre) return;
    const bodyArgs = { nombre };
    if (password) bodyArgs.password = password;
    
    document.getElementById('create-modal').style.pointerEvents = 'none';
    const r = await api('/bots', { method: 'POST', body: JSON.stringify(bodyArgs) });
    document.getElementById('create-modal').style.pointerEvents = 'auto';
    
    if (r?.ok) {
      closeModal('create-modal');
      toast('✅ Bot creado: ' + nombre, 'success');
      loadBots();
      // Auto-start and open QR
      const id = r.data.botId;
      await api(`/bots/${id}/start`, { method: 'POST' });
      openQr(id);
    } else {
      toast('❌ ' + (r?.error || 'Error al crear'), 'error');
    }
  }

  // ── QR modal ─────────────────────────────────────────────────
  let qrEventSource = null;

  function openQr(botId) {
    closeQrModal();
    document.getElementById('qr-container').innerHTML = '<div class="spinner"></div>';
    document.getElementById('qr-status').style.display = 'none';
    document.getElementById('qr-modal').classList.add('open');

    qrEventSource = new EventSource(`/api/saas/bots/${botId}/qr`);
    qrEventSource.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.ready) {
        document.getElementById('qr-container').innerHTML = '<div style="font-size:48px">✅</div>';
        const st = document.getElementById('qr-status');
        st.textContent = '¡Bot conectado exitosamente!';
        st.style.display = '';
        qrEventSource.close();
        loadBots();
      } else if (data.qr) {
        renderQr(data.qr);
      }
    };
    qrEventSource.onerror = () => qrEventSource.close();
  }

  async function renderQr(dataUrl) {
    const img = document.createElement('img');
    img.src = dataUrl;
    img.style.borderRadius = '10px';
    img.style.maxWidth = '220px';
    img.style.width = '100%';
    document.getElementById('qr-container').innerHTML = '';
    document.getElementById('qr-container').appendChild(img);
  }

  function closeQrModal() {
    if (qrEventSource) { qrEventSource.close(); qrEventSource = null; }
    document.getElementById('qr-modal').classList.remove('open');
  }

  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  let toastTimer;
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }

  function loadScript(src) {
    return new Promise(resolve => {
      const s = document.createElement('script');
      s.src = src; s.onload = resolve;
      document.head.appendChild(s);
    });
  }
</script>
</body>
</html>
